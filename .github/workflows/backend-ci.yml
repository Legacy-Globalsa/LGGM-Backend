name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - '**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '**'
      - '.github/workflows/backend-ci.yml'

jobs:
  validate:
    name: Validate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (node --check)
        run: npm run validate

      - name: Smoke-load app (boots without listening)
        env:
          NODE_ENV: development
          PORT: 3000
          FRONTEND_URL: http://localhost:5173
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
          SUPABASE_JWT_SECRET: ci-placeholder-jwt-secret
          SUPABASE_ANON_KEY: ci-placeholder-anon-key
        run: node -e "require('./src/app'); console.log('app loads ok');"

  security:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high
