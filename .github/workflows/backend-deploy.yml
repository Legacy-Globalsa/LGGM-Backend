name: Backend Deploy

# Deploys the Backend to Render through a Render Deploy Hook.
#
# Required GitHub repository secret:
#   RENDER_DEPLOY_HOOK_URL

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

concurrency:
  group: backend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run validate

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is empty in this workflow run." >&2
            echo "Check GitHub repo Settings -> Secrets and variables -> Actions." >&2
            echo "The secret must be named exactly: RENDER_DEPLOY_HOOK_URL" >&2
            echo "Because this job uses environment: production, also check Settings -> Environments -> production -> Environment secrets." >&2
            exit 1
          fi
          echo "Triggering Render deploy hook..."
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL" -o /dev/null -w "HTTP %{http_code}\n"

      - name: Deploy summary
        run: |
          echo "### Backend deploy triggered" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Provider: Render via deploy hook" >> "$GITHUB_STEP_SUMMARY"
